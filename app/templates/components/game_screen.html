<div id="game-container">
<div class="flex flex-col min-h-full bg-black">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-black border-b" style="border: 3px solid var(--arcade-yellow); background-color: var(--arcade-black);">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-arcade-yellow text-sm px-3 py-1.5 rounded transition-all" style="color: var(--arcade-yellow); background-color: transparent; border: 2px solid var(--arcade-yellow); font-family: 'Courier Prime', monospace; font-weight: bold;">
            ◄ BACK
        </button>
        <h1 class="font-bold text-arcade-yellow" style="color: var(--arcade-yellow); font-family: 'Press Start 2P', cursive; font-size: 1rem;">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-arcade-cyan text-sm py-2 px-4" style="color: var(--arcade-cyan); background-color: var(--arcade-black); font-family: 'Courier Prime', monospace; font-weight: bold;">
        ► TAP SQUARE WHEN YOU FIND A MATCH ◄
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-arcade-red text-arcade-white text-center py-2 font-semibold text-sm" style="background-color: var(--arcade-red); color: var(--arcade-white); border: 3px solid var(--arcade-yellow); font-family: 'Press Start 2P', cursive; font-size: 0.6rem;">
        ★ BINGO! LINE COMPLETED! ★
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
