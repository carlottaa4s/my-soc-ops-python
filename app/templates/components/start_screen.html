<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-black">
    <div class="text-center max-w-sm">
        <h1 class="text-5xl font-bold text-arcade-yellow mb-2" style="color: var(--arcade-yellow);">SOC OPS</h1>
        <p class="text-lg text-arcade-cyan mb-8" style="color: var(--arcade-cyan); font-family: 'Courier Prime', monospace; font-weight: bold;">SOCIAL BINGO ARCADE</p>

        <div class="arcade-border-thick p-6 mb-8" style="background-color: var(--arcade-black); border: 4px solid var(--arcade-white);">
            <h2 class="font-bold text-arcade-white mb-3" style="color: var(--arcade-white); font-family: 'Press Start 2P', cursive; font-size: 0.7rem;">SELECT MODE</h2>
            <ul class="text-left text-arcade-cyan text-sm space-y-2" style="color: var(--arcade-cyan); font-family: 'Courier Prime', monospace;">
                <li>BINGO: Get 5 in a row</li>
                <li>HUNT: Find all 24</li>
            </ul>
        </div>

        <div class="space-y-3">
            <button
                hx-post="/start-bingo"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full arcade-button" style="background-color: var(--arcade-blue); border: 4px solid var(--arcade-white); box-shadow: 6px 6px 0 var(--arcade-shadow); font-family: 'Press Start 2P', cursive; font-size: 0.65rem; padding: 16px 24px; color: var(--arcade-white); font-weight: bold;">
                ► BINGO MODE ◄
            </button>
            <button
                hx-post="/start-scavenger-hunt"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full arcade-button" style="background-color: var(--arcade-green); border: 4px solid var(--arcade-white); box-shadow: 6px 6px 0 var(--arcade-shadow); font-family: 'Press Start 2P', cursive; font-size: 0.65rem; padding: 16px 24px; color: var(--arcade-black); font-weight: bold;">
                ► SCAVENGER HUNT ◄
            </button>
        </div>
    </div>
</div>
</div>
